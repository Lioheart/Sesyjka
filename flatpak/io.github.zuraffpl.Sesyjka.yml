id: io.github.zuraffpl.Sesyjka
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: sesyjka
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
cleanup:
  - /share/man
  - /share/doc
  - /lib/python*/site-packages/*/__pycache__
  - /lib/python*/site-packages/*/*/__pycache__
modules:
  - python3-openpyxl.json

  - name: sesyjka
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-deps --no-index --no-build-isolation --prefix=${FLATPAK_DEST} .
      - install -Dm644 data/io.github.zuraffpl.Sesyjka.desktop ${FLATPAK_DEST}/share/applications/io.github.zuraffpl.Sesyjka.desktop
      - install -Dm644 data/io.github.zuraffpl.Sesyjka.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.zuraffpl.Sesyjka.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/io.github.zuraffpl.Sesyjka.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/io.github.zuraffpl.Sesyjka.svg
      - install -Dm644 data/icons/hicolor/64x64/apps/io.github.zuraffpl.Sesyjka.png ${FLATPAK_DEST}/share/icons/hicolor/64x64/apps/io.github.zuraffpl.Sesyjka.png
      - install -Dm644 data/icons/hicolor/128x128/apps/io.github.zuraffpl.Sesyjka.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/io.github.zuraffpl.Sesyjka.png
      - install -Dm644 data/icons/hicolor/256x256/apps/io.github.zuraffpl.Sesyjka.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/io.github.zuraffpl.Sesyjka.png
      - install -Dm644 LICENSE ${FLATPAK_DEST}/share/licenses/io.github.zuraffpl.Sesyjka/LICENSE
      - install -Dm644 NOTICE.md ${FLATPAK_DEST}/share/licenses/io.github.zuraffpl.Sesyjka/NOTICE.md
    sources:
      - type: dir
        path: ..
