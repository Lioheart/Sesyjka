name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Compile sources
        run: python3 -m compileall -q sesyjka tests

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

      - name: Validate shell scripts
        run: bash -n run.sh install-linux.sh uninstall-linux.sh packaging/*.sh
